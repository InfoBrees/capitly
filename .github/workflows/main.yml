name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: test_(${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [core, auth]
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Run module tests
      working-directory: ./capitly
      run: mvn -B -ntp -pl ${{ matrix.module }} test

  linting_backend:
    name: linting_backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run check
        working-directory: ./capitly
        run: mvn -B -ntp spotless:check spotbugs:check pmd:check

      - name: Upload PMD report
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: |
            ./capitly/core/target/reports/pmd.html
            ./capitly/auth/target/reports/pmd.html

  linting_frontend:
    name: linting_frontend
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Run check
      working-directory: ./frontend
      run: npm run lint && npm run format:check

  build-jar:
    name: build_JAR
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    needs: [test, linting_backend, linting_frontend]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Set Maven version from tag (tag builds)
      if: startsWith(github.ref, 'refs/tags/')
      working-directory: ./capitly
      shell: bash
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        mvn -B -ntp -q versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

    - name: Build module jars (skip tests)
      working-directory: ./capitly
      run: mvn -B -ntp -pl core,auth clean package -DskipTests

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: jar-artifact
        path: |
          capitly/core/target/capitly-core-*.jar
          capitly/auth/target/capitly-auth-*.jar

  release:
    name: release_JAR
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-jar
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-artifact
          path: artifact

      - name: publish JAR
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifact/**/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
